name: Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0 or 1.0.0.rc1"
        required: true
        default: "0.1.0"
      runtime:
        description: "Runtime identifier"
        required: true
        default: "win-x64"
        type: choice
        options:
          - win-x64
      msi:
        description: "Generate MSI in addition to Setup.exe"
        required: true
        default: true
        type: boolean
      bundle_dependencies:
        description: "Bundle pinned com0com/hub4com dependency archives"
        required: true
        default: true
        type: boolean
      upload_release:
        description: "Upload artifacts to the matching GitHub Release"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows Velopack
    runs-on: windows-latest

    env:
      PACKAGE_RUNTIME: ${{ github.event.inputs.runtime || 'win-x64' }}
      PACKAGE_MSI: ${{ github.event.inputs.msi || 'true' }}
      PACKAGE_BUNDLE_DEPENDENCIES: ${{ github.event.inputs.bundle_dependencies || 'true' }}
      PACKAGE_UPLOAD_RELEASE: ${{ github.event.inputs.upload_release || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        id: meta
        shell: pwsh
        run: |
          function ConvertTo-VelopackVersion {
            param([string]$ReleaseVersion)

            if ($ReleaseVersion -match '^\d+\.\d+\.\d+([\-+][0-9A-Za-z\-.]+)?$') {
              return $ReleaseVersion
            }

            if ($ReleaseVersion -match '^(\d+\.\d+\.\d+)\.((?=[0-9A-Za-z\-.]*[A-Za-z])[0-9A-Za-z][0-9A-Za-z\-.]*)(\+[0-9A-Za-z\-.]+)?$') {
              return "$($Matches[1])-$($Matches[2])$($Matches[3])"
            }

            throw "Version '$ReleaseVersion' is not supported. Use SemVer2 such as 1.0.0-rc1, or release labels such as 1.0.0.rc1."
          }

          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "${{ github.event.inputs.version }}"
          }

          if ($version -notmatch '^[0-9A-Za-z][0-9A-Za-z.\-+]*$') {
            throw "Release version may only contain letters, numbers, dot, dash, and plus. Provided: $version"
          }

          $packageVersion = ConvertTo-VelopackVersion $version
          "version=$version" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies and tools
        run: |
          dotnet restore VComTunnel.sln
          dotnet tool restore

      - name: Build
        run: dotnet build VComTunnel.sln -c Release --no-restore

      - name: Test
        run: dotnet run -c Release --no-build --project tests\VComTunnel.Tests\VComTunnel.Tests.csproj

      - name: Package Velopack assets
        shell: pwsh
        run: |
          $packageArgs = @{
            Version = "${{ steps.meta.outputs.version }}"
            Runtime = "$env:PACKAGE_RUNTIME"
            Restore = $true
            OutputRoot = "artifacts\github-release"
          }

          if ($env:PACKAGE_MSI -eq "true") {
            $packageArgs.Msi = $true
          }

          if ($env:PACKAGE_BUNDLE_DEPENDENCIES -ne "true") {
            $packageArgs.SkipBundledDependencies = $true
          }

          & scripts\package-velopack.ps1 @packageArgs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcomtunnel-${{ steps.meta.outputs.version }}-${{ env.PACKAGE_RUNTIME }}
          path: |
            artifacts/github-release/public/${{ env.PACKAGE_RUNTIME }}/*
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: github.ref_type == 'tag' || env.PACKAGE_UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "${{ steps.meta.outputs.tag }}" }
          $assetPaths = @(
            Get-ChildItem -LiteralPath "artifacts\github-release\public\${{ env.PACKAGE_RUNTIME }}" -File
          )

          if ($assetPaths.Count -eq 0) {
            throw "No release assets were produced."
          }

          $unversionedAssets = @($assetPaths | Where-Object { $_.Name -notlike "*${{ steps.meta.outputs.version }}*" })
          if ($unversionedAssets.Count -gt 0) {
            throw "Release asset names must include version '${{ steps.meta.outputs.version }}': $($unversionedAssets.Name -join ', ')"
          }

          $assetArguments = @($assetPaths | ForEach-Object { $_.FullName })

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag @assetArguments --verify-tag --title "VComTunnel ${{ steps.meta.outputs.version }}" --notes "Automated VComTunnel packaging artifacts."
          } else {
            gh release upload $tag @assetArguments --clobber
          }

          $uploadedCount = gh release view $tag --json assets --jq ".assets | length"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify GitHub Release assets for $tag."
          }

          if ([int]$uploadedCount -lt $assetPaths.Count) {
            throw "GitHub Release $tag has $uploadedCount asset(s), expected at least $($assetPaths.Count)."
          }
